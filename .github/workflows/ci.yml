name: CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Lint & Check Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-hack,cargo-machete,cargo-shear,taplo-cli,typos-cli,rumdl,cargo-nextest
      
      - name: Install cargo-sort
        run: cargo install cargo-sort

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libfreetype-dev libfontconfig1-dev

      - name: Pin transitive dependencies
        run: cargo update -p time --precise 0.3.47

      - name: Lint
        run: just ci

      - name: Check features
        run: just check-feature
