[package]
name = "hpx-cli"
version.workspace = true
description = "CLI for hpx — high-performance HTTP client and download engine"
repository.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true

[[bin]]
name = "hpx"
path = "src/main.rs"
doc = false

[dependencies]
clap = { workspace = true, features = ["derive", "env"] }
eyre = { workspace = true }
futures = { workspace = true }
hpx = { workspace = true, features = [
    "http1",
    "http2",
    "ws",
    "json",
    "stream",
    "tracing",
    "boring",
    "cookies",
    "form",
    "multipart",
] }
hpx-browser = { workspace = true, features = ["cdp"] }
hpx-dl = { workspace = true }
hpx-yawc = { workspace = true, features = ["proxy"] }
http = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "macros",
    "io-std",
    "io-util",
    "signal",
    "fs",
    "time",
    "process",
] }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
axum = { workspace = true, features = ["ws"] }
futures-util = { workspace = true }
proptest = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["net", "time", "process"] }
tokio-test = { workspace = true }

[lints]
workspace = true
